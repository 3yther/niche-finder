<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Niche Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 55%, #2d1b69 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      color: #e2e8f0;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 2rem;
      text-decoration: none;
    }

    .brand-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }

    .brand-icon svg { width: 18px; height: 18px; }

    .brand-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 20px;
      padding: 2.25rem 2rem;
      backdrop-filter: blur(16px);
      position: relative;
      z-index: 1;
    }

    .card h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.3rem;
    }

    .card .sub {
      font-size: 0.875rem;
      color: #94a3b8;
      margin-bottom: 1.75rem;
    }

    .field { margin-bottom: 1.1rem; }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      letter-spacing: 0.04em;
      margin-bottom: 0.4rem;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: #fff;
      font-family: "Inter", sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus {
      border-color: rgba(99,102,241,0.7);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }

    input::placeholder { color: #475569; }

    .btn {
      width: 100%;
      margin-top: 0.5rem;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border: none;
      border-radius: 10px;
      padding: 0.8rem;
      color: #fff;
      font-family: "Inter", sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:hover   { opacity: 0.88; transform: translateY(-1px); }
    .btn:active  { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .error-box {
      display: none;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 0.7rem 0.9rem;
      font-size: 0.85rem;
      color: #fca5a5;
      margin-bottom: 1rem;
    }

    .footer-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: #64748b;
    }

    .footer-link a {
      color: #818cf8;
      text-decoration: none;
      font-weight: 500;
    }

    .footer-link a:hover { text-decoration: underline; }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.25rem 0;
      color: #334155;
      font-size: 0.8rem;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>

  <a href="/" class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
        <polyline points="16 7 22 7 22 13"/>
      </svg>
    </div>
    <span class="brand-name">Niche Finder</span>
  </a>

  <div class="card">
    <h1>Welcome back</h1>
    <p class="sub">Sign in to your Niche Finder account.</p>

    <div class="error-box" id="error-box"></div>

    <div class="field">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Your password" autocomplete="current-password" />
    </div>

    <button class="btn" id="submit-btn" onclick="doLogin()">Sign in</button>

    <div class="divider">or</div>

    <p class="footer-link">Don't have an account? <a href="/register">Create one free</a></p>
  </div>

<script>
  document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

  async function doLogin() {
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const btn      = document.getElementById("submit-btn");
    const errBox   = document.getElementById("error-box");

    errBox.style.display = "none";

    if (!email || !password) {
      showError("Please fill in all fields.");
      return;
    }

    btn.disabled = true;
    btn.textContent = "Signing in…";

    try {
      const res  = await fetch("/login", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ email, password }),
      });
      const data = await res.json();

      if (!res.ok) {
        showError(data.error || "Something went wrong.");
        return;
      }

      window.location.href = "/";
    } catch {
      showError("Network error. Please try again.");
    } finally {
      btn.disabled = false;
      btn.textContent = "Sign in";
    }
  }

  function showError(msg) {
    const box = document.getElementById("error-box");
    box.textContent = msg;
    box.style.display = "block";
  }
</script>
</body>
</html>
