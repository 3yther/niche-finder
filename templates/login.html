{% extends "base.html" %}

{% block title %}Sign in — Niche Finder{% endblock %}

{% block extra_css %}
<style>
  .auth-wrap {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1.25rem;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 20px;
    padding: 2.25rem 2rem;
    backdrop-filter: blur(16px);
  }

  .card h1 { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 0.3rem; }
  .card .sub { font-size: 0.875rem; color: #94a3b8; margin-bottom: 1.75rem; }

  .field { margin-bottom: 1.1rem; }

  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: #94a3b8;
    letter-spacing: 0.04em;
    margin-bottom: 0.4rem;
  }

  input[type="email"], input[type="password"] {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    color: #fff;
    font-family: "Inter", sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  input:focus {
    border-color: rgba(99,102,241,0.7);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
  }

  input::placeholder { color: #475569; }

  .btn {
    width: 100%;
    margin-top: 0.5rem;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    border: none;
    border-radius: 10px;
    padding: 0.8rem;
    color: #fff;
    font-family: "Inter", sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn:hover   { opacity: 0.88; transform: translateY(-1px); }
  .btn:active  { transform: translateY(0); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .error-box {
    display: none;
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    padding: 0.7rem 0.9rem;
    font-size: 0.85rem;
    color: #fca5a5;
    margin-bottom: 1rem;
  }

  .footer-link {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.875rem;
    color: #64748b;
  }

  .footer-link a { color: #818cf8; text-decoration: none; font-weight: 500; }
  .footer-link a:hover { text-decoration: underline; }

  .divider {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin: 1.25rem 0;
    color: #334155;
    font-size: 0.8rem;
  }

  .divider::before, .divider::after {
    content: "";
    flex: 1;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="card">
    <h1>Welcome back</h1>
    <p class="sub">Sign in to your Niche Finder account.</p>

    <div class="error-box" id="error-box"></div>

    <div class="field">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Your password" autocomplete="current-password" />
    </div>

    <button class="btn" id="submit-btn" onclick="doLogin()">Sign in</button>

    <div class="divider">or</div>

    <p class="footer-link">Don't have an account? <a href="/register">Create one free</a></p>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

  async function doLogin() {
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const btn      = document.getElementById("submit-btn");
    const errBox   = document.getElementById("error-box");

    errBox.style.display = "none";

    if (!email || !password) { showError("Please fill in all fields."); return; }

    btn.disabled = true;
    btn.textContent = "Signing in…";

    try {
      const res  = await fetch("/login", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ email, password }),
      });
      const data = await res.json();

      if (!res.ok) { showError(data.error || "Something went wrong."); return; }
      window.location.href = "/";
    } catch {
      showError("Network error. Please try again.");
    } finally {
      btn.disabled = false;
      btn.textContent = "Sign in";
    }
  }

  function showError(msg) {
    const box = document.getElementById("error-box");
    box.textContent = msg;
    box.style.display = "block";
  }
</script>
{% endblock %}
